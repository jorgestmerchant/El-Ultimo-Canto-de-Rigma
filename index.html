<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Último Canto de Rigma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <audio id="bg-music" src="Fairy Lands _ FANTASY MUSIC in a Magical Forest _ Fantasy Ambience.mp3" loop></audio>
  <div class="fairies-container" id="fairies-container"></div>

  <aside class="panel">
    <div class="panel-header">
      <span class="panel-diamond"></span>
      <h1 class="panel-title">Glosario</h1>
    </div>
    <nav class="panel-nav">
      <button class="panel-item is-active" data-section="races">Razas</button>
    </nav>
  </aside>

  <div class="races-view" id="races-view">
    <aside class="races-list">
      <h2 class="races-list-title">Razas</h2>
      <button class="race-item is-active" data-race="humanos">
        <img class="race-chip-img" src="Razas/Humanos/Logo Humanos.png" alt="">Humanos
      </button>
      <button class="race-item" data-race="elfos">
        <img class="race-chip-img" src="Razas/Elfos/Logo Elfo (Alto Elfo).png" alt="">Elfos
      </button>
      <button class="race-item" data-race="enanos">
        <img class="race-chip-img" src="Razas/Enanos/Logo Enanos.png" alt="">Enanos
      </button>
      <button class="race-item" data-race="medianos">
        <img class="race-chip-img" src="Razas/Medianos/Logo Medianos.png" alt="">Medianos
      </button>
      <button class="race-item" data-race="orcos">
        <img class="race-chip-img" src="Razas/Orcos/Logo Orcos.png" alt="">Orcos
      </button>
      <button class="race-item" data-race="elfos_oscuros">
        <img class="race-chip-img" src="Razas/Elfos Oscuros/Logo Elfo Oscuro.png" alt="">Elfos Oscuros
      </button>
      <button class="race-item" data-race="kators">
        <img class="race-chip-img" src="Razas/Kators/Logo Kator.png" alt="">Kators
      </button>
      <button class="race-item" data-race="pandarens">
        <img class="race-chip-img" src="Razas/Pandarens/Logo Pandarens.png" alt="">Pandarens
      </button>
      <button class="race-item" data-race="crozhar">
        <img class="race-chip-img" src="Razas/Crozhar/Logo Crozhar.png" alt="">Crozhar
      </button>
      <button class="race-item" data-race="drakthir">
        <img class="race-chip-img" src="Razas/Drakthir/Logo Drakthir.png" alt="">Drakthir
      </button>
      <button class="race-item" data-race="huargens">
        <img class="race-chip-img" src="Razas/Huargen/Logo Huargen.png" alt="">Huargens
      </button>
      <button class="race-item" data-race="elfos_noche">
        <img class="race-chip-img" src="Razas/Elfos de la Noche/Logo Elfo de la Noche.png" alt="">Elfos de la noche
      </button>
      <button class="race-item" data-race="elfos_nato">
        <img class="race-chip-img" src="Razas/Elfo Nato-Nocturno/Logo Elfo Nato-Nocturno.png" alt="">Elfos Nato-Nocturno
      </button>
      <button class="race-item" data-race="taurens">
        <img class="race-chip-img" src="Razas/Tauren/Logo Tauren.png" alt="">Taurens
      </button>
      <button class="race-item" data-race="morthra">
        <img class="race-chip-img" src="Razas/Morthra/Logo Morthra.png" alt="">Morthra
      </button>
      <button class="race-item" data-race="draeneis">
        <img class="race-chip-img" src="Razas/Draeneis/Logo Draeneis.png" alt="">Draeneis
      </button>
      <button class="race-item" data-race="amblys">
        <img class="race-chip-img" src="Razas/Amblys/Logo Amblys.png" alt="">Amblys
      </button>
      <button class="race-item" data-race="automatas">
        <img class="race-chip-img" src="Razas/Automatas/Logo Automatas.png" alt="">Automatas
      </button>
      <button class="race-item" data-race="eterios">
        <img class="race-chip-img" src="Razas/Eterios/Logo Eterio.png" alt="">Eterios
      </button>
      <button class="race-item" data-race="faunos">
        <img class="race-chip-img" src="Razas/Faunos/Logo Fauno.png" alt="">Faunos
      </button>
      <button class="race-item" data-race="goetia">
        <img class="race-chip-img" src="Razas/Goetia/Logo Goetia.png" alt="">Goetia
      </button>
      <button class="race-item" data-race="ninfas">
        <img class="race-chip-img" src="Razas/Ninfas/Logo Ninfas.png" alt="">Ninfas
      </button>
      <button class="race-item" data-race="tiefling">
        <img class="race-chip-img" src="Razas/Tieflings/Logo Tieflings.png" alt="">Tiefling
      </button>
    </aside>

    <div class="race-image">
      <span class="race-image-placeholder">Imagen de la raza</span>
      <div class="race-squares-top" id="race-squares-top">
        <span class="square"></span>
        <span class="square"></span>
      </div>
      <div class="race-squares-bottom-left" id="race-squares-bottom-left">
        <span class="square"></span>
        <span class="square"></span>
      </div>
      <div class="race-squares" id="race-squares">
        <img class="square-img" id="race-img-1" src="" alt="" data-img="">
        <img class="square-img" id="race-img-2" src="" alt="" data-img="">
        <img class="square-img" id="race-img-3" src="" alt="" data-img="">
      </div>
    </div>

    <aside class="race-description">
      <div class="race-main-image">
        <img id="race-main-img" src="" alt="">
      </div>
      <h2 class="race-name" id="race-name">Humanos</h2>
      <p class="race-desc" id="race-desc">Selecciona una raza para ver su descripción.</p>
      <div class="passive-container">
        <h3 class="passive-title">Pasiva</h3>
        <div class="passive-box" id="passive-box">
          <span class="passive-placeholder">Sin pasiva</span>
        </div>
      </div>
    </aside>
  </div>

  <script src="script.js"></script>
</body>
</html>
